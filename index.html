<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi em 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Montserrat,sans-serif;
  color:#fff;

  /* 🌌 VŨ TRỤ HỒNG */
  background:
    radial-gradient(circle at top,
      #ff9acb 0%,
      #c45fa3 25%,
      #5a2a6d 45%,
      #0b1a2a 70%,
      #000 100%);
}

/* 🌌 stars */
.star{
  position:absolute;
  width:2px;height:2px;
  background:white;
  opacity:.7;
  animation:twinkle 3s infinite;
  filter: drop-shadow(0 0 6px rgba(255,200,230,.6));
}
@keyframes twinkle{
  0%,100%{opacity:.2}
  50%{opacity:1}
}

/* 👑 intro */
.intro{
  position:absolute;
  font-family:'Playfair Display',serif;
  font-size:48px;
  color:#ffe4f1;
  animation:intro 3s forwards;
  z-index:10;
}
@keyframes intro{
  0%{opacity:0;transform:scale(.9)}
  30%{opacity:1}
  80%{opacity:1}
  100%{opacity:0;transform:scale(1.05)}
}

/* 💌 card */
.card{
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(20px);
  padding:60px 50px;
  border-radius:30px;
  max-width:560px;
  text-align:center;
  box-shadow:0 40px 90px rgba(255,0,120,.5);
  opacity:0;
  animation:showCard 1s forwards;
  animation-delay:3s;
  position:relative;
  z-index:5;
}
@keyframes showCard{to{opacity:1}}

h1{
  font-family:'Playfair Display',serif;
  font-size:36px;
}
p{
  line-height:1.9;
  color:#ffe6f2;
  min-height:130px;
}
button{
  margin-top:30px;
  padding:14px 36px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff5fa2,#ff9acb);
  color:#fff;
  cursor:pointer;
  font-size:15px;
}
.signature{
  margin-top:28px;
  font-family:'Great Vibes',cursive;
  font-size:30px;
  color:#ffd1e8;
  opacity:0;
  transition:1.5s;
}
.card.show .signature{opacity:1}

/* 🐔🐎 */
.character{
  position:absolute;
  bottom:60px;
  width:120px;
  height:120px;
  z-index:4;
  animation:bob 2s infinite ease-in-out;
}
.left{left:60px}
.right{right:60px}

@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.body{
  font-size:80px;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}
.left .body{
  transform:translate(-50%,-50%) scaleX(-1);
}

/* 🔫 */
.gun{
  position:absolute;
  font-size:32px;
  top:42px;
  z-index:6;
  animation:shake .15s infinite alternate;
}
.left .gun{
  right:-18px;
  transform:scaleX(-1);
}
.right .gun{
  left:-18px;
}
@keyframes shake{
  from{rotate:2deg}
  to{rotate:-2deg}
}

.shadow{
  position:absolute;
  width:90px;height:18px;
  background:rgba(0,0,0,.4);
  border-radius:50%;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  filter:blur(6px);
}

/* 💖 HEART */
.heart{
  position:absolute;
  font-size:16px;
  pointer-events:none;
  z-index:3;
  animation:
    fly 1.1s ease-out forwards,
    fall 4s ease-in-out forwards;
  animation-delay:0s,1.1s;
}

@keyframes fly{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(var(--hit-x),var(--hit-y)) scale(1.4)}
}

@keyframes fall{
  0%{
    transform:translate(var(--hit-x),var(--hit-y));
    opacity:1;
  }
  70%{
    transform:
      translate(
        calc(var(--hit-x) + var(--sway)),
        calc(var(--hit-y) + var(--fall-y))
      )
      rotate(var(--rot));
  }
  85%{
    transform:
      translate(
        calc(var(--hit-x) + var(--sway2)),
        calc(var(--hit-y) + var(--fall-y))
      )
      rotate(var(--rot2))
      scale(.9);
  }
  100%{
    transform:
      translate(
        calc(var(--hit-x) + var(--sway2)),
        calc(var(--hit-y) + var(--fall-y))
      )
      rotate(var(--rot2))
      scale(.4);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="intro">Chào Công Chúa 👑</div>

<script>
for(let i=0;i<100;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
}
</script>

<div class="character left" id="chicken">
  <div class="gun">🔫</div>
  <div class="body">🐔</div>
  <div class="shadow"></div>
</div>

<div class="character right" id="horse">
  <div class="gun">🔫</div>
  <div class="body">🐎</div>
  <div class="shadow"></div>
</div>

<div class="card" id="card">
  <h1>Happy Women’s Day 💕</h1>
  <p id="text">Anh có một điều muốn nói…</p>
  <button onclick="openMessage()">Bấm vào đây 💌</button>
  <div class="signature">8/3 hạnh phúc nhé bé Quỳnh 💖</div>
</div>

<script>
function openMessage(){
  const msg=
"Giữa những bộn bề của cuộc sống,\n"+
"em vẫn là điều dịu dàng nhất\n"+
"mà anh luôn trân trọng.\n\n"+
"Anh mong em sẽ luôn rạng rỡ như ánh mặt trời,\n"+
"luôn sáng chói và ấm áp.\n\n"+
"Nụ cười của em rất đẹp,\n"+
"hãy luôn nâng niu nó trên gương mặt nhé.";

  const t=document.getElementById("text");
  const card=document.getElementById("card");
  let i=0; t.innerHTML="";

  function type(){
    if(i<msg.length){
      t.innerHTML+=msg[i]=="\n"?"<br>":msg[i];
      i++; setTimeout(type,55);
    }else{
      card.classList.add("show");
      shootHearts();
    }
  }
  type();
}

function shootHearts(){
  const colors=["#ff5fa2","#ff8fcf","#ffd1e8"];
  const card=document.getElementById("card");
  const rect=card.getBoundingClientRect();

  for(let i=0;i<90;i++){
    setTimeout(()=>{
      ["chicken","horse"].forEach(id=>{
        const c=document.getElementById(id);
        const g=c.querySelector(".gun").getBoundingClientRect();

        const h=document.createElement("div");
        h.className="heart";
        h.innerText="❤";
        h.style.color=colors[Math.floor(Math.random()*colors.length)];

        const startX=g.left+12;
        const startY=g.top+12;

        const hitX = id==="chicken"
          ? rect.left - startX
          : rect.right - startX;

        const hitY = rect.top - startY + 120;
        const fallY = rect.bottom - (startY + hitY) - 10;

        h.style.left=startX+"px";
        h.style.top=startY+"px";
        h.style.setProperty("--hit-x",hitX+"px");
        h.style.setProperty("--hit-y",hitY+"px");
        h.style.setProperty("--fall-y",fallY+"px");
        h.style.setProperty("--sway",(Math.random()*100-50)+"px");
        h.style.setProperty("--sway2",(Math.random()*60-30)+"px");
        h.style.setProperty("--rot",(Math.random()*120-60)+"deg");
        h.style.setProperty("--rot2",(Math.random()*180-90)+"deg");

        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
      });
    },i*70);
  }
}
</script>

</body>
</html>
