<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi em 💖</title>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Montserrat,sans-serif;
  color:#fff;
  position:relative;
  background:#000;
  perspective:1200px;
}

/* ================= MOBILE ================= */
@media (max-width:768px){
  body{perspective:800px;}
  .card{max-width:90%;padding:40px 25px;border-radius:22px;}
  h1{font-size:22px;}
  p{font-size:14px;min-height:100px;}
  button{padding:10px 24px;font-size:13px;}
  .signature{font-size:20px;}
  .character{width:80px;height:80px;bottom:30px;}
  .body{font-size:55px;}
  .gun{font-size:22px;top:28px;}
  .left{left:10px;}
  .right{right:10px;}
  #earthCanvas{width:220px !important;height:220px !important;}
}

/* ================= GALAXY ================= */
.space{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .15s linear;
}

.galaxy{
  position:absolute;
  width:1600px;
  height:1600px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  filter:blur(60px);
  opacity:.7;
  animation:rotateGalaxy 220s linear infinite;
}

.layer1{
  background:radial-gradient(circle,
    rgba(255,255,255,.9) 0%,
    rgba(255,220,255,.6) 5%,
    rgba(200,150,255,.3) 15%,
    rgba(100,0,200,.15) 30%,
    rgba(0,0,0,0) 60%);
}

.layer2{
  background:radial-gradient(circle,
    rgba(0,200,255,.4),
    rgba(0,100,255,.2),
    transparent 70%);
  animation-duration:320s;
  opacity:.4;
}

@keyframes rotateGalaxy{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* ================= STARS ================= */
.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle 3s infinite alternate;
}
.star.small{width:1px;height:1px;background:white;opacity:.6}
.star.medium{width:2px;height:2px;background:#cce6ff;opacity:.8}
.star.big{width:3px;height:3px;background:#fff;box-shadow:0 0 8px #fff;}

@keyframes twinkle{
  from{opacity:.2}
  to{opacity:1}
}

/* ================= CARD ================= */
.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(25px);
  padding:60px 50px;
  border-radius:30px;
  max-width:560px;
  text-align:center;
  box-shadow:0 0 80px rgba(255,150,220,.6),
             0 0 150px rgba(150,100,255,.5),
             0 0 250px rgba(0,200,255,.4);
  border:1px solid rgba(255,255,255,.35);
  position:relative;
  z-index:5;
  transform:rotateY(90deg);
  opacity:0;
  transition:transform 1s ease, opacity 1s ease;
}

.card.reveal{
  transform:rotateY(0deg);
  opacity:1;
  animation:floatCard 6s ease-in-out infinite,
            glowPulse 4s ease-in-out infinite;
}

@keyframes floatCard{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

@keyframes glowPulse{
  0%,100%{
    box-shadow:0 0 80px rgba(255,150,220,.6),
               0 0 150px rgba(150,100,255,.5),
               0 0 250px rgba(0,200,255,.4);
  }
  50%{
    box-shadow:0 0 100px rgba(255,180,230,.8),
               0 0 180px rgba(170,120,255,.7),
               0 0 300px rgba(0,220,255,.6);
  }
}

h1{font-family:'Playfair Display',serif;font-size:36px}
p{line-height:1.9;color:#ffe6f2;min-height:130px}

button{
  margin-top:30px;
  padding:14px 36px;
  border:none;border-radius:40px;
  background:linear-gradient(135deg,#ff5fa2,#ff9acb);
  color:#fff;cursor:pointer;font-size:15px;
}

.signature{
  margin-top:28px;
  font-family:'Great Vibes',cursive;
  font-size:30px;color:#ffd1e8;
  opacity:0;transition:1.5s;
}
.card.show .signature{opacity:1}

/* ================= EARTH INTRO ================= */
.intro-earth{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

.intro-earth.hide{
  opacity:0;
  pointer-events:none;
}

#earthCanvas{
  width:300px;
  height:300px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="intro-earth" id="introEarth">
  <canvas id="earthCanvas"></canvas>
</div>

<div class="space" id="space">
  <div class="galaxy layer1"></div>
  <div class="galaxy layer2"></div>
</div>

<div class="card" id="card">
  <h1>Happy Women’s Day 💕</h1>
  <p id="text">Anh có một điều muốn nói…</p>
  <button onclick="startMessage()">Bấm vào đây 💌</button>
  <div class="signature">8/3 tràn ngập hạnh phúc nhé, bé Quỳnh 💖</div>
</div>

<script>

/* PARALLAX */
document.addEventListener("mousemove",(e)=>{
  const x=(e.clientX/window.innerWidth-0.5)*20;
  const y=(e.clientY/window.innerHeight-0.5)*20;
  document.getElementById("space").style.transform=
    `rotateY(${x}deg) rotateX(${-y}deg)`;
});

/* STARS */
function createStars(count,type){
  for(let i=0;i<count;i++){
    const s=document.createElement("div");
    s.className="star "+type;
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
  }
}
createStars(300,"small");
createStars(150,"medium");
createStars(80,"big");

/* ================= EARTH 3D ================= */

const canvas = document.getElementById("earthCanvas");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,1,0.1,1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setSize(300,300);
renderer.setPixelRatio(window.devicePixelRatio);

const geometry = new THREE.SphereGeometry(1,64,64);
const loader = new THREE.TextureLoader();

const material = new THREE.MeshPhongMaterial({
  map: loader.load("https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"),
  bumpMap: loader.load("https://threejs.org/examples/textures/earthbump1k.jpg"),
  bumpScale:0.05,
  specularMap: loader.load("https://threejs.org/examples/textures/earthspec1k.jpg"),
  specular:new THREE.Color('grey')
});

const earth = new THREE.Mesh(geometry,material);
scene.add(earth);

const light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,3,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x333333));

let speed = 0.002;

function animate(){
  requestAnimationFrame(animate);
  earth.rotation.y += speed;
  renderer.render(scene,camera);
}
animate();

canvas.addEventListener("click",()=>{
  speed = 0.2;
  setTimeout(()=>{
    document.getElementById("introEarth").classList.add("hide");
    setTimeout(()=>{
      document.getElementById("introEarth").remove();
      document.getElementById("card").classList.add("reveal");
    },800);
  },1200);
});

/* ================= MESSAGE ================= */

function startMessage(){
  const msg="Giữa những bộn bề của cuộc sống này,\nem vẫn là điều dịu dàng nhất anh từng biết...\nNgày hôm nay, và kể cả những ngày tháng sau này nữa.\n\nAnh mong chúc cho em sẽ luôn được bình an, luôn được yêu thương\nluôn xinh đẹp và luôn rạng rỡ như ánh mặt trời.\n\nVà em biết gì không?\nNụ cười của em đẹp lắm đó,\nhãy nhớ nâng niu nó mỗi ngày trên gương mặt tươi tắn của em nhé!";

  const t=document.getElementById("text");
  const card=document.getElementById("card");
  let i=0;
  t.innerHTML="";

  function type(){
    if(i<msg.length){
      t.innerHTML+=msg[i]=="\n"?"<br>":msg[i];
      i++;
      setTimeout(type,35);
    }else{
      card.classList.add("show");
    }
  }
  type();
}

</script>
</body>
</html>
