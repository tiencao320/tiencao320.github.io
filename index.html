<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For Changg 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
font-family:'Playfair Display',serif;
color:white;
}

/* INTRO */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

#introText{

font-family:'Cinzel',serif;
font-size:80px;
letter-spacing:6px;

background:linear-gradient(90deg,#ffffff,#6bdcff,#ff7ac6,#ffffff);
background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:introFade 4s forwards,galaxyFlow 8s linear infinite;

text-shadow:
0 0 20px rgba(120,200,255,.7),
0 0 50px rgba(255,120,180,.5);
}

@keyframes galaxyFlow{
0%{background-position:0%}
100%{background-position:300%}
}

@keyframes introFade{
0%{opacity:0;transform:scale(.8)}
100%{opacity:1;transform:scale(1)}
}

#enter{
margin-top:50px;
padding:14px 35px;
font-size:18px;
border-radius:40px;
border:none;

background:linear-gradient(45deg,#ff4da6,#ff9ac2);
color:white;

cursor:pointer;

box-shadow:0 0 20px rgba(255,120,180,.6);
transition:.4s;
}

#enter:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(255,120,180,.9);
}

/* GALAXY */

#galaxy{
position:absolute;
width:100%;
height:100%;
display:none;

background:
radial-gradient(circle at 30% 30%,rgba(120,60,255,.25),transparent 40%),
radial-gradient(circle at 70% 70%,rgba(0,160,255,.25),transparent 40%),
radial-gradient(circle,#03050f,#000000);

overflow:hidden;
}

/* STARS */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* BOOK */

.book{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
width:360px;
height:520px;
perspective:2000px;
transition:transform .8s, filter .8s;
}

.book.active{
transform:translate(-50%,-50%) scale(1.12);
filter:brightness(1.2) drop-shadow(0 0 25px rgba(255,150,200,.8));
}

/* PAGE */

.page{

position:absolute;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%, rgba(255,100,180,.35), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(120,200,255,.35), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(255,120,220,.25), transparent 40%),
linear-gradient(180deg,#05060f,#0b0820,#04020a);

border-radius:25px;

padding:70px 55px;

text-align:center;

backdrop-filter:blur(10px);

box-shadow:
0 0 40px rgba(255,120,180,.35),
0 0 90px rgba(120,200,255,.25);

}

/* FLOWER BORDER */

.page::before{
content:"🌸 ✿ 🌸 ✿ 🌸 ✿ 🌸";
position:absolute;
top:10px;
left:0;
right:0;
text-align:center;
font-size:22px;
opacity:.8;
}

.page::after{
content:"🌸 ✿ 🌸 ✿ 🌸 ✿ 🌸";
position:absolute;
bottom:10px;
left:0;
right:0;
text-align:center;
font-size:22px;
opacity:.8;
}

/* COVER */

.cover{

position:absolute;
width:100%;
height:100%;

background:linear-gradient(140deg,#ff4da6,#6bdcff,#111);

border-radius:25px;

display:flex;
align-items:center;
justify-content:center;

font-family:'Great Vibes',cursive;
font-size:42px;

text-align:center;

color:white;

cursor:pointer;

transform-origin:left;

transition:transform 1.4s;

box-shadow:
0 0 50px rgba(255,90,170,.6),
0 0 120px rgba(90,180,255,.3);

padding:40px;

}

/* MESSAGE */

#message{

font-family:'Cormorant Garamond',serif;

font-size:26px;

line-height:1.9;

letter-spacing:.6px;

margin-top:20px;

min-height:160px;

color:#f8eaff;

text-shadow:
0 0 10px rgba(255,200,240,.5),
0 0 20px rgba(120,200,255,.3);

}

/* SIGNATURE */

#signature{

margin-top:40px;

font-family:'Great Vibes',cursive;

font-size:34px;

color:#ff9ac2;

opacity:0;

transition:opacity 2s;

text-align:center;

}

/* HEART */

.heart{
position:absolute;
font-size:20px;
color:#ff9ac2;
animation:heartMove 2s forwards;
}

@keyframes heartMove{
0%{transform:scale(.2)}
100%{transform:translate(var(--x),var(--y)) scale(1);opacity:0}
}

/* FIREWORK */

#fireCanvas{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<div id="intro">
<div id="introText">Một chút yêu thương cho buổi trưa nắng nóng</div>
<button id="enter">Bấm vào đây để tới điều bất ngờ</button>
</div>

<div id="galaxy">

<canvas id="fireCanvas"></canvas>

<div class="book">

<div class="page">

<div id="message"></div>

<div id="signature">
Trưa mát nhó bé Changgg
</div>

</div>

<div class="cover" id="cover">
Chạm khẽ tay em vào đây
</div>

</div>

</div>

<script>

const intro=document.getElementById("intro")
const galaxy=document.getElementById("galaxy")

document.getElementById("enter").onclick=()=>{

intro.style.display="none"
galaxy.style.display="block"

createStars()

}

function createStars(){

for(let i=0;i<500;i++){

let s=document.createElement("div")
s.className="star"

let size=Math.random()*3

s.style.width=size+"px"
s.style.height=size+"px"

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"

galaxy.appendChild(s)

}

}

const cover=document.getElementById("cover")

cover.onclick=()=>{

cover.style.transform="rotateY(-170deg)"

document.querySelector(".book").classList.add("active")

startTyping()

}

const text="Chúc em buổi trưa vui vẻ, công việc chất đầy nhưng niềm vui đong mãi. Anh thì đang nhớ em một chút rồi đó 💛."

let i=0

function startTyping(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(startTyping,40)

}else{

document.getElementById("signature").style.opacity=1

burstHearts()

startFirework()

}

}

function burstHearts(){

const rect=document.querySelector(".book").getBoundingClientRect()

for(let i=0;i<60;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="❤"

let x=(Math.random()*2-1)*250+"px"
let y=(Math.random()*2-1)*250+"px"

h.style.setProperty("--x",x)
h.style.setProperty("--y",y)

h.style.left=rect.left+rect.width/2+"px"
h.style.top=rect.top+rect.height/2+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

const canvas=document.getElementById("fireCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function startFirework(){

setInterval(createExplosion,400)

animate()

}

function createExplosion(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<70;i++){

particles.push({

x:x,
y:y,

angle:Math.random()*Math.PI*2,
speed:Math.random()*6+2,

life:90,

color:["#ff4da6","#ffffff","#9fd3ff","#ff7ac6"][Math.floor(Math.random()*4)]

})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed

p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

if(p.life<=0) particles.splice(i,1)

})

requestAnimationFrame(animate)

}

</script>

</body>
</html>
