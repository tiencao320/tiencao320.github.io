<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gửi em 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 768px){
  body{ perspective:800px; }

  .card{
    max-width:90%;
    padding:40px 25px;
    border-radius:22px;
  }

  h1{ font-size:22px; }
  p{ font-size:14px; min-height:100px; }

  button{
    padding:10px 24px;
    font-size:13px;
  }

  .signature{ font-size:20px; }

  .character{
    width:80px;
    height:80px;
    bottom:30px;
  }

  .body{ font-size:55px; }
  .gun{ font-size:22px; top:28px; }

  .left{ left:10px; }
  .right{ right:10px; }

  .spark{
    width:10px;
    height:10px;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100svh;
  height:100dvh;
  width:100%;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Montserrat,sans-serif;
  color:#fff;
  position:relative;
  background:#000;
  perspective:1200px;
}

/* ===== INTRO ===== */

#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  cursor:pointer;
  transition:opacity 1.5s ease, visibility 1.5s ease;
}

#intro.hide{
  opacity:0;
  visibility:hidden;
}

.intro-content{
  text-align:center;
}

.intro-title{
  font-family:'Playfair Display',serif;
  font-size:42px;
  background:linear-gradient(90deg,#fff,#ff9acb,#00eaff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  opacity:0;
  animation:fadeInText 2s forwards .5s;
}

.intro-sub{
  margin-top:20px;
  font-size:16px;
  color:#ffd1e8;
  opacity:0;
  animation:fadeInText 2s forwards 1.5s;
}

@keyframes fadeInText{
  to{opacity:1}
}

/* ===== FLASH EFFECT ===== */

.flash{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,
      rgba(255,255,255,1) 0%,
      rgba(255,255,255,0.9) 20%,
      rgba(255,255,255,0.6) 40%,
      rgba(255,255,255,0.2) 70%,
      transparent 100%);
  z-index:2000;
  pointer-events:none;
  animation:flashBang 0.9s ease-out forwards;
}

@keyframes flashBang{
  0%{ opacity:0; }
  10%{ opacity:1; }
  40%{ opacity:0.9; }
  100%{ opacity:0; }
}

/* ===== DEEP GALAXY ===== */

.space{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform .15s linear;
  will-change:transform;
}

.galaxy{
  position:absolute;
  width:1600px;
  height:1600px;
  top:50%;
  left:50%;
  transform:translate3d(-50%,-50%,0);
  border-radius:50%;
  filter:blur(60px);
  opacity:.7;
  animation:rotateGalaxy 220s linear infinite;
  will-change:transform;
}

.layer1{
  background:radial-gradient(circle,
    rgba(255,255,255,.9) 0%,
    rgba(255,220,255,.6) 5%,
    rgba(200,150,255,.3) 15%,
    rgba(100,0,200,.15) 30%,
    rgba(0,0,0,0) 60%);
}

.layer2{
  background:radial-gradient(circle,
    rgba(0,200,255,.4),
    rgba(0,100,255,.2),
    transparent 70%);
  animation-duration:320s;
  opacity:.4;
}

@keyframes rotateGalaxy{
  from{transform:translate3d(-50%,-50%,0) rotate(0deg)}
  to{transform:translate3d(-50%,-50%,0) rotate(360deg)}
}

/* ===== STARS ===== */

.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle 3s infinite alternate;
}
.star.small{width:1px;height:1px;background:white;opacity:.6}
.star.medium{width:2px;height:2px;background:#cce6ff;opacity:.8}
.star.big{
  width:3px;height:3px;background:#fff;
  box-shadow:0 0 8px #fff;
}

@keyframes twinkle{
  from{opacity:.2}
  to{opacity:1}
}

/* ===== CARD ===== */

.card{
  will-change: transform;
  transform: translateZ(0);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  padding:60px 50px;
  border-radius:30px;
  max-width:560px;
  text-align:center;
  opacity:0;
  animation:showCard 1s forwards 3s,
            floatCard 6s ease-in-out infinite 4s,
            glowPulse 4s ease-in-out infinite;
  box-shadow:0 0 80px rgba(255,150,220,.6),
             0 0 150px rgba(150,100,255,.5),
             0 0 250px rgba(0,200,255,.4);
  border:1px solid rgba(255,255,255,.35);
  position:relative;
  z-index:5;
  transition:transform .6s ease;
}

@keyframes glowPulse{
  0%,100%{
    box-shadow:0 0 80px rgba(255,150,220,.6),
               0 0 150px rgba(150,100,255,.5),
               0 0 250px rgba(0,200,255,.4);
  }
  50%{
    box-shadow:0 0 100px rgba(255,180,230,.8),
               0 0 180px rgba(170,120,255,.7),
               0 0 300px rgba(0,220,255,.6);
  }
}

@keyframes floatCard{
  0%,100%{ transform:translate3d(0,0,0); }
  50%{ transform:translate3d(0,-12px,0); }
}

@keyframes showCard{ to{opacity:1} }

h1{font-family:'Playfair Display',serif;font-size:36px}
p{line-height:1.9;color:#ffe6f2;min-height:130px}

button{
  margin-top:30px;
  padding:14px 36px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff5fa2,#ff9acb);
  color:#fff;
  cursor:pointer;
  font-size:15px;
}

.signature{
  margin-top:28px;
  font-family:'Great Vibes',cursive;
  font-size:30px;
  color:#ffd1e8;
  opacity:0;
  transition:1.5s;
}
.card.show .signature{opacity:1}

/* ===== CHARACTER ===== */

.character{
  position:absolute;
  bottom:60px;
  width:120px;
  height:120px;
  animation:bob 2s infinite ease-in-out;
  z-index:10;
}

.left{left:60px}
.right{right:60px}

@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.body{
  font-size:80px;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}
.left .body{transform:translate(-50%,-50%) scaleX(-1)}

.gun{position:absolute;font-size:32px;top:42px}
.left .gun{right:-18px;transform:scaleX(-1)}
.right .gun{left:-18px}

/* ===== HEART ===== */

.heart{
  position:absolute;
  font-size:22px;
  pointer-events:none;
  animation:
    fly .7s ease-out forwards,
    drop 1.3s ease-in forwards .7s,
    settle 2s ease-out forwards 2s;
}

@keyframes fly{
  from{transform:translate(0,0)}
  to{transform:translate(var(--hit-x),var(--hit-y))}
}
@keyframes drop{
  0%{transform:translate(var(--hit-x),var(--hit-y))}
  100%{
    transform:translate(
      calc(var(--hit-x) + var(--sway)),
      calc(var(--hit-y) + var(--drop-y))
    );
  }
}
@keyframes settle{
  from{
    transform:translate(
      calc(var(--hit-x) + var(--sway)),
      calc(var(--hit-y) + var(--drop-y))
    ) rotate(0deg);
  }
  to{
    transform:translate(
      calc(var(--hit-x) + var(--sway) + var(--roll)),
      calc(var(--hit-y) + var(--drop-y))
    ) rotate(360deg);
  }
}

/* ===== FIREWORK ===== */

.explosion{
  position:absolute;
  pointer-events:none;
}

.spark{
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  box-shadow:0 0 20px currentColor,
             0 0 40px currentColor,
             0 0 80px currentColor;
  animation:sparkMove 1600ms ease-out forwards;
}

@keyframes sparkMove{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{
    transform:translate(calc(var(--dx)*1px),calc(var(--dy)*1px)) scale(0);
    opacity:0;
  }
}

</style>
</head>

<body>

<div id="intro">
  <div class="intro-content">
    <h2 class="intro-title">A small galaxy for you ✨</h2>
    <p class="intro-sub">Bấm để bước vào thế giới của anh làm cho em 💫</p>
  </div>
</div>

<div class="space" id="space">
  <div class="galaxy layer1"></div>
  <div class="galaxy layer2"></div>
</div>

<div class="character left" id="chicken">
  <div class="gun">🔫</div>
  <div class="body">🐔</div>
</div>

<div class="character right" id="horse">
  <div class="gun">🔫</div>
  <div class="body">🐎</div>
</div>

<div class="card" id="card">
  <h1>Happy Women’s Day 💕</h1>
  <p id="text">Anh có một điều muốn nói…</p>
  <button onclick="openMessage()">Chạm khẽ tay em vào đây đi 💌</button>
  <div class="signature">8/3 tràn ngập hạnh phúc nhé, bé .... 💖</div>
</div>

<script>

/* INTRO + FLASH */
document.getElementById("intro").addEventListener("click",function(){
  const flash=document.createElement("div");
  flash.className="flash";
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),900);
  setTimeout(()=>{ this.classList.add("hide"); },200);
});

/* PARALLAX */
document.addEventListener("mousemove",(e)=>{
  const x=(e.clientX/window.innerWidth-0.5)*20;
  const y=(e.clientY/window.innerHeight-0.5)*20;
  document.getElementById("space").style.transform=
    `rotateY(${x}deg) rotateX(${-y}deg)`;
});

/* STARS (FIX iOS) */
function createStars(count,type){
  for(let i=0;i<count;i++){
    const s=document.createElement("div");
    s.className="star "+type;
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(s);
  }
}
createStars(300,"small");
createStars(150,"medium");
createStars(80,"big");

/* MESSAGE */
function openMessage(){
  const msg="Giữa những bộn bề của cuộc sống này,\nem vẫn là điều dịu dàng nhất anh từng biết...\nNgày hôm nay, và kể cả những ngày tháng sau này nữa.\n\nAnh mong chúc cho em sẽ luôn được bình an, luôn được yêu thương\nluôn xinh đẹp và luôn rạng rỡ như ánh mặt trời.\n\nVà em biết gì không?\nNụ cười của em đẹp lắm đó,\nhãy nhớ nâng niu nó mỗi ngày trên gương mặt tươi tắn của em nhé!";

  const t=document.getElementById("text");
  const card=document.getElementById("card");
  let i=0;
  t.innerHTML="";

  function type(){
    if(i<msg.length){
      t.innerHTML+=msg[i]=="\n"?"<br>":msg[i];
      i++;
      setTimeout(type,35);
    }else{
      card.classList.add("show");
      shootHearts();
      superFireworks();
    }
  }
  type();
}

/* HEART + FIREWORK GIỮ NGUYÊN */
function shootHearts(){
  const colors=["#ff5fa2","#ff8fcf","#ffd1e8"];
  const card=document.getElementById("card");
  const rect=card.getBoundingClientRect();

  for(let i=0;i<13;i++){
    setTimeout(()=>{
      ["chicken","horse"].forEach(id=>{
        const c=document.getElementById(id);
        const g=c.querySelector(".gun").getBoundingClientRect();

        const h=document.createElement("div");
        h.className="heart";
        h.innerText="❤";
        h.style.color=colors[Math.floor(Math.random()*colors.length)];

        const startX=g.left+10;
        const startY=g.top+10;

        const hitX=id==="chicken"
          ? rect.left-startX-5
          : rect.right-startX+5;

        const hitY=rect.top-startY+100;
        const dropY=rect.bottom-hitY-startY+20;

        h.style.left=startX+"px";
        h.style.top=startY+"px";
        h.style.setProperty("--hit-x",hitX+"px");
        h.style.setProperty("--hit-y",hitY+"px");
        h.style.setProperty("--drop-y",dropY+"px");
        h.style.setProperty("--sway",(Math.random()*40-20)+"px");
        h.style.setProperty("--roll",(Math.random()*60-30)+"px");

        document.body.appendChild(h);

        setTimeout(()=>{
          const r=h.getBoundingClientRect();
          explode(r.left+r.width/2,r.top+r.height/2);
          h.remove();
        },3000);
      });
    },i*120);
  }
}

function superFireworks(){
  setInterval(()=>{
    const x=Math.random()*window.innerWidth;
    const y=Math.random()*window.innerHeight*0.6;
    explode(x,y);
  },1800);
}

function explode(x,y){
  const colors=["#ffffff","#ffb6e6","#ff2e63","#00eaff"];
  const explosion=document.createElement("div");
  explosion.className="explosion";
  explosion.style.left=x+"px";
  explosion.style.top=y+"px";

  for(let i=0;i<70;i++){
    const spark=document.createElement("div");
    spark.className="spark";
    spark.style.color=colors[Math.floor(Math.random()*colors.length)];

    const angle=Math.random()*Math.PI*2;
    const distance=180+Math.random()*250;

    spark.style.setProperty("--dx",Math.cos(angle)*distance);
    spark.style.setProperty("--dy",Math.sin(angle)*distance);

    explosion.appendChild(spark);
  }

  document.body.appendChild(explosion);
  setTimeout(()=>explosion.remove(),1700);
}

</script>
</body>
</html>
