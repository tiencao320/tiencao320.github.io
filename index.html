<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gửi em 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100svh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Montserrat,sans-serif;
  color:#fff;
  position:relative;
  background:#000;
  perspective:1200px;
}

/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 768px){

  body{
    perspective:800px;
    padding:20px;
  }

  .card{
    width:100%;
    max-width:420px;
    padding:40px 25px;
    border-radius:22px;
  }

  h1{font-size:22px;}
  p{font-size:14px;min-height:100px;}
  button{padding:10px 24px;font-size:13px;}
  .signature{font-size:20px;}

  .character{
    width:80px;
    height:80px;
    bottom:30px;
  }

  .body{font-size:55px;}
  .gun{font-size:22px;top:28px;}

  .left{left:20px;}
  .right{right:20px;}

  .spark{
    width:10px;
    height:10px;
  }
}

/* ===== GALAXY ===== */

.space{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .15s linear;
}

.galaxy{
  position:absolute;
  width:1600px;
  height:1600px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  filter:blur(60px);
  opacity:.7;
  animation:rotateGalaxy 220s linear infinite;
}

.layer1{
  background:radial-gradient(circle,
    rgba(255,255,255,.9) 0%,
    rgba(255,220,255,.6) 5%,
    rgba(200,150,255,.3) 15%,
    rgba(100,0,200,.15) 30%,
    rgba(0,0,0,0) 60%);
}

.layer2{
  background:radial-gradient(circle,
    rgba(0,200,255,.4),
    rgba(0,100,255,.2),
    transparent 70%);
  animation-duration:320s;
  opacity:.4;
}

@keyframes rotateGalaxy{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* ===== STARS ===== */

.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle 3s infinite alternate;
}
.star.small{width:1px;height:1px;background:white;opacity:.6}
.star.medium{width:2px;height:2px;background:#cce6ff;opacity:.8}
.star.big{width:3px;height:3px;background:#fff;box-shadow:0 0 8px #fff;}

@keyframes twinkle{
  from{opacity:.2}
  to{opacity:1}
}

/* ===== CARD ===== */

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(25px);
  padding:60px 50px;
  border-radius:30px;
  max-width:560px;
  text-align:center;
  opacity:0;
  animation:showCard 1s forwards 3s,
            floatCard 6s ease-in-out infinite 4s,
            glowPulse 4s ease-in-out infinite;
  box-shadow:0 0 80px rgba(255,150,220,.6),
             0 0 150px rgba(150,100,255,.5),
             0 0 250px rgba(0,200,255,.4);
  border:1px solid rgba(255,255,255,.35);
  position:relative;
  z-index:5;
  transition:transform .6s ease;
}

@keyframes glowPulse{
  0%,100%{
    box-shadow:0 0 80px rgba(255,150,220,.6),
               0 0 150px rgba(150,100,255,.5),
               0 0 250px rgba(0,200,255,.4);
  }
  50%{
    box-shadow:0 0 100px rgba(255,180,230,.8),
               0 0 180px rgba(170,120,255,.7),
               0 0 300px rgba(0,220,255,.6);
  }
}

@keyframes floatCard{
  0%,100%{transform:translate3d(0,0,0);}
  50%{transform:translate3d(0,-12px,0);}
}

@keyframes showCard{to{opacity:1}}

h1{font-family:'Playfair Display',serif;font-size:36px}
p{line-height:1.9;color:#ffe6f2;min-height:130px}

button{
  margin-top:30px;
  padding:14px 36px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff5fa2,#ff9acb);
  color:#fff;
  cursor:pointer;
  font-size:15px;
}

.signature{
  margin-top:28px;
  font-family:'Great Vibes',cursive;
  font-size:30px;
  color:#ffd1e8;
  opacity:0;
  transition:1.5s;
}
.card.show .signature{opacity:1}

/* ===== CHARACTER ===== */

.character{
  position:absolute;
  bottom:60px;
  width:120px;
  height:120px;
  animation:bob 2s infinite ease-in-out;
  z-index:10;
}
.left{left:60px}
.right{right:60px}

@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.body{
  font-size:80px;
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
.left .body{transform:translate(-50%,-50%) scaleX(-1)}

.gun{position:absolute;font-size:32px;top:42px}
.left .gun{right:-18px;transform:scaleX(-1)}
.right .gun{left:-18px}

/* ===== HEART & FIREWORK giữ nguyên ===== */

.heart{
  position:absolute;
  font-size:22px;
  pointer-events:none;
  animation:
    fly .7s ease-out forwards,
    drop 1.3s ease-in forwards .7s,
    settle 2s ease-out forwards 2s;
}

@keyframes fly{
  from{transform:translate(0,0)}
  to{transform:translate(var(--hit-x),var(--hit-y))}
}
@keyframes drop{
  100%{
    transform:translate(
      calc(var(--hit-x) + var(--sway)),
      calc(var(--hit-y) + var(--drop-y))
    );
  }
}
@keyframes settle{
  to{
    transform:translate(
      calc(var(--hit-x) + var(--sway) + var(--roll)),
      calc(var(--hit-y) + var(--drop-y))
    ) rotate(360deg);
  }
}

.explosion{position:absolute;pointer-events:none;}
.spark{
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  box-shadow:0 0 20px currentColor,
             0 0 40px currentColor,
             0 0 80px currentColor;
  animation:sparkMove 1600ms ease-out forwards;
}
@keyframes sparkMove{
  100%{
    transform:translate(calc(var(--dx)*1px),calc(var(--dy)*1px)) scale(0);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="space" id="space">
  <div class="galaxy layer1"></div>
  <div class="galaxy layer2"></div>
</div>

<div class="character left" id="chicken">
  <div class="gun">🔫</div>
  <div class="body">🐔</div>
</div>

<div class="character right" id="horse">
  <div class="gun">🔫</div>
  <div class="body">🐎</div>
</div>

<div class="card" id="card">
  <h1>Happy Women’s Day 💕</h1>
  <p id="text">Anh có một điều muốn nói…</p>
  <button onclick="openMessage()">Bấm vào đây 💌</button>
  <div class="signature">8/3 tràn ngập hạnh phúc nhé, bé Quỳnh 💖</div>
</div>

<script>

/* PARALLAX chỉ desktop */
if(window.innerWidth > 768){
  document.addEventListener("mousemove",(e)=>{
    const x=(e.clientX/window.innerWidth-0.5)*20;
    const y=(e.clientY/window.innerHeight-0.5)*20;
    document.getElementById("space").style.transform=
      `rotateY(${x}deg) rotateX(${-y}deg)`;
  });
}

/* phần JS còn lại giữ nguyên của Tiến */

</script>
</body>
</html>
